<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CHAWKPRO × TUMANA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#08080c}
body{font-family:'Space Grotesk',sans-serif;color:#fff}
#root{height:100%;display:flex;flex-direction:column}
:root{
  --g:#10b981;--g2:#059669;--gd:linear-gradient(135deg,#10b981,#059669);
  --a:#f59e0b;--ad:linear-gradient(135deg,#f59e0b,#d97706);
  --p:#8b5cf6;--pd:linear-gradient(135deg,#8b5cf6,#7c3aed);
  --bg:#08080c;--c:#111116;--c2:#1a1a22;
  --br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.13);
  --t2:rgba(255,255,255,0.45);--t3:rgba(255,255,255,0.2);
}
.app{width:100%;max-width:430px;height:100%;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.8)}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.sb{background:#000;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:34px;height:34px;border:3px solid var(--br);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
.rs{display:flex;flex-direction:column;height:100%;overflow:hidden}
.rs-hero{padding:28px 20px 16px;flex-shrink:0}
.rs-eye{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--t2);text-transform:uppercase;margin-bottom:12px}
.rs-h{font-size:30px;font-weight:800;line-height:1.1;margin-bottom:6px}
.rs-sub{font-size:13px;color:var(--t2);line-height:1.5}
.rs-tabs{display:flex;margin:0 20px 16px;background:var(--c);border-radius:12px;padding:4px;gap:4px;flex-shrink:0}
.rt{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;color:var(--t2)}
.rt-g{background:var(--gd);color:#000}
.rt-a{background:var(--ad);color:#000}
.rs-cards{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:10px}
.rc{background:var(--c);border:1.5px solid var(--br);border-radius:15px;padding:16px;cursor:pointer;transition:.15s;position:relative}
.rc:active{transform:scale(.98)}
.rc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rc-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ico-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.ico-a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.ico-p{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.rc-name{font-size:16px;font-weight:700;margin-bottom:2px}
.rc-sub{font-size:11px;color:var(--t2)}
.rc-perks{display:flex;flex-direction:column;gap:4px}
.perk{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px}
.rc-arr{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3)}
.form-wrap{padding:20px;overflow-y:auto;flex:1}
.bk{display:flex;align-items:center;gap:6px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px;width:fit-content}
.fi{font-size:40px;margin-bottom:10px}
.ft{font-size:22px;font-weight:700;margin-bottom:6px}
.fs{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--c2);border:1.5px solid var(--br2);border-radius:10px;padding:13px;font-size:15px;color:#fff;font-family:'Space Grotesk',sans-serif}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--g)}
.fld input::placeholder,.fld textarea::placeholder{color:var(--t3);font-size:13px}
.fld select option{background:#1a1a22}
.btn{width:100%;padding:15px;border-radius:10px;border:none;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-g{background:var(--gd);color:#000;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-a{background:var(--ad);color:#000}
.btn-p{background:var(--pd);color:#fff}
.btn-ghost{background:transparent;border:1.5px solid var(--br2);color:var(--t2)}
.divd{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--t3);font-size:11px}
.divd::before,.divd::after{content:'';flex:1;height:1px;background:var(--br)}
.hdr{padding:14px 18px;flex-shrink:0;border-bottom:1px solid var(--br)}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.loc-pill{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);padding:7px 12px;border-radius:20px;font-size:12px;font-weight:700;color:var(--g)}
.ava{width:34px;height:34px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;font-weight:700;color:#000}
.srch{background:var(--c);border:1.5px solid var(--br2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--t3);margin-top:10px;display:flex;gap:6px}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);padding:12px 18px 6px;flex-shrink:0}
.favs{display:flex;gap:10px;overflow-x:auto;padding:0 18px 10px;scrollbar-width:none}
.favs::-webkit-scrollbar{display:none}
.fav-it{min-width:60px;text-align:center;cursor:pointer;flex-shrink:0}
.fav-ring{width:52px;height:52px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 5px;border:2px solid rgba(16,185,129,.3);transition:.15s}
.fav-nm{font-size:10px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px;margin:0 auto}
.cnt{padding:4px 18px 16px}
.sc{background:var(--c);border:1.5px solid var(--br);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;transition:.15s}
.sc:active{transform:scale(.98)}
.sc-row{display:flex;gap:10px;align-items:center}
.sc-ico{width:50px;height:50px;border-radius:11px;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.sc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--br2);padding:3px 8px;border-radius:20px;font-size:11px;color:var(--t2);font-weight:600}
.chip-g{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.18);color:var(--g)}
.ph{padding:12px 18px;flex-shrink:0;border-bottom:1px solid var(--br)}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:var(--c2);border:1px solid var(--br2);border-radius:9px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;margin-bottom:12px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:11px 18px}
.pc{background:var(--c);border:1.5px solid var(--br);border-radius:12px;overflow:hidden}
.pi{height:90px;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:40px}
.pb{padding:10px}
.pn{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.3}
.pp{font-size:16px;font-weight:700;color:var(--g);margin-bottom:6px}
.add-btn{width:100%;background:var(--gd);border:none;border-radius:7px;padding:8px;font-size:11px;font-weight:700;color:#000;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.qr{display:flex;align-items:center;justify-content:space-between;gap:5px}
.qb{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.qb-m{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.qb-p{background:rgba(16,185,129,.1);color:var(--g);border:1px solid rgba(16,185,129,.2)}
.pu-hero{background:linear-gradient(135deg,#0d1f17,#1a0d30);border:1.5px solid rgba(139,92,246,.2);border-radius:14px;padding:18px;margin-bottom:16px}
.pu-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:var(--p);margin-bottom:8px}
.pu-title{font-size:19px;font-weight:800;margin-bottom:4px}
.pu-sub{font-size:12px;color:var(--t2);line-height:1.5}
.loc-f{background:var(--c2);border:1.5px solid var(--br2);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.loc-f input{background:transparent;border:none;font-size:14px;color:#fff;font-family:'Space Grotesk',sans-serif;flex:1}
.loc-f input:focus{outline:none}
.loc-f input::placeholder{color:var(--t3);font-size:13px}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ldot-g{background:var(--g)}.ldot-r{background:#ef4444}
.est-box{background:rgba(139,92,246,.06);border:1.5px solid rgba(139,92,246,.15);border-radius:10px;padding:12px;margin:10px 0;display:flex;gap:8px;align-items:center}
.est-it{flex:1;text-align:center}
.est-v{font-size:17px;font-weight:700;color:var(--p)}
.est-l{font-size:10px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.est-div{width:1px;height:32px;background:rgba(139,92,246,.2)}
.ci{background:var(--c);border:1.5px solid var(--br);border-left:3px solid var(--g);border-radius:12px;padding:12px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.sum-box{background:rgba(16,185,129,.04);border:1.5px solid rgba(16,185,129,.13);border-radius:12px;padding:13px;margin:12px 0}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin:4px 0}
.sum-tot{font-size:16px;font-weight:700;color:var(--g);border-top:1px solid rgba(16,185,129,.18);padding-top:9px;margin-top:7px}
.flow-box{background:var(--c2);border:1px solid var(--br);border-radius:8px;padding:10px;margin-top:8px}
.flow-t{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g);margin-bottom:6px}
.flow-r{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin:3px 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;z-index:1000}
.modal{background:linear-gradient(180deg,#141a18,#0d0d0f);border:1.5px solid rgba(16,185,129,.2);border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-height:85vh;overflow-y:auto}
.m-handle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:0 auto 16px}
.m-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:5px}
.m-sub{font-size:12px;color:var(--t2);text-align:center;margin-bottom:16px;line-height:1.6}
.pay-box{background:rgba(16,185,129,.05);border:1.5px solid rgba(16,185,129,.18);border-radius:12px;padding:13px;margin-bottom:12px}
.pay-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.pay-lbl{font-size:12px;color:var(--t2)}
.pay-val{font-size:15px;font-weight:700;color:var(--g)}
.steps{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.step{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--t2)}
.sn{width:18px;height:18px;border-radius:50%;background:var(--g);color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.two-btn{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.oc{background:var(--c);border:1.5px solid var(--br);border-radius:13px;padding:13px;margin-bottom:10px}
.oc-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:9px}
.spill{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.s1{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.s2{background:rgba(16,185,129,.1);color:var(--g);border:1px solid rgba(16,185,129,.2)}
.s3{background:rgba(139,92,246,.1);color:var(--p);border:1px solid rgba(139,92,246,.2)}
.s4{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.s5{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.s6{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.tracker{margin:10px 0 8px}
.tr-step{display:flex;gap:9px;align-items:flex-start}
.tr-left{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0}
.tr-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.tr-dot.done{background:var(--g);color:#000;font-weight:800}
.tr-dot.active{background:var(--p);color:#fff}
.tr-dot.todo{background:var(--c2);color:var(--t3);border:1.5px solid var(--br2)}
.tr-line{width:2px;flex:1;min-height:10px;margin:2px 0}
.tr-line.done{background:var(--g)}.tr-line.todo{background:var(--br2)}
.tr-body{padding-bottom:10px;flex:1}
.tr-name{font-size:12px;font-weight:700;margin-bottom:1px}
.tr-time{font-size:10px;color:var(--t2)}
.rider-row{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:9px;margin-top:7px;display:flex;align-items:center;gap:9px}
.fav-star{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer}
.sh{background:linear-gradient(180deg,#1f1500,var(--bg));padding:16px;flex-shrink:0}
.sh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scard{background:var(--c2);border:1.5px solid var(--br);border-radius:12px;padding:12px}
.sv{font-size:20px;font-weight:700;margin-bottom:2px}
.slbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.tog-strip{display:flex;justify-content:space-between;align-items:center;background:rgba(16,185,129,.04);border:1.5px solid rgba(16,185,129,.12);border-radius:10px;padding:10px 12px;margin-top:10px}
.tog-track{width:46px;height:25px;border-radius:13px;background:#333;position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.tog-track.on{background:var(--g)}
.tog-thumb{width:19px;height:19px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.3s;pointer-events:none}
.tog-track.on .tog-thumb{transform:translateX(21px)}
.shop-tabs{display:flex;background:var(--c);border-radius:10px;padding:3px;margin:10px 18px 0;gap:3px;flex-shrink:0}
.stab{flex:1;padding:8px 4px;text-align:center;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;color:var(--t2)}
.stab.act{background:var(--ad);color:#000}
.do-card{background:var(--c);border:1.5px solid var(--br);border-left:4px solid var(--g);border-radius:12px;padding:13px;margin-bottom:10px}
.mp-inp{width:100%;background:var(--c2);border:1.5px solid rgba(16,185,129,.22);border-radius:8px;padding:11px;font-size:14px;color:#fff;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.mp-inp:focus{outline:none;border-color:var(--g)}
.mp-inp::placeholder{text-transform:none;letter-spacing:0;color:var(--t3)}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-rej{background:transparent;border:1.5px solid rgba(239,68,68,.35);color:#ef4444;padding:10px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.btn-cfm{background:var(--gd);border:none;color:#000;padding:10px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.rh{background:linear-gradient(180deg,#110a20,var(--bg));padding:16px;flex-shrink:0}
.r-tog{display:flex;justify-content:space-between;align-items:center;background:var(--c2);border:1.5px solid var(--br2);border-radius:12px;padding:12px 14px;margin-top:12px}
.job-card{background:var(--c);border:1.5px solid rgba(139,92,246,.22);border-radius:14px;padding:14px;margin-bottom:10px;position:relative}
.new-badge{position:absolute;top:10px;right:10px;background:var(--pd);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.pu-tag{position:absolute;top:10px;right:10px;background:rgba(245,158,11,.15);color:var(--a);border:1px solid rgba(245,158,11,.25);font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.rr{display:flex;gap:9px;margin:8px 0;align-items:flex-start}
.rd{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rd-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.rd-p{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.rd-a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.earn-hl{background:rgba(16,185,129,.05);border:1.5px solid rgba(16,185,129,.13);border-radius:9px;padding:9px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.jbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.btn-dec{background:transparent;border:1.5px solid rgba(239,68,68,.3);color:#ef4444;padding:9px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.btn-acc{background:var(--gd);border:none;color:#000;padding:9px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.active-job{background:var(--c);border:2px solid var(--g);border-radius:14px;padding:14px;margin-bottom:12px}
.profile-hdr{background:linear-gradient(135deg,#0d1f17,var(--bg));border:1.5px solid rgba(16,185,129,.15);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}
.p-ava{width:64px;height:64px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;border:2px solid rgba(16,185,129,.3);font-weight:700;color:#000}
.bnav{display:flex;background:#000;border-top:1px solid var(--br);flex-shrink:0;padding:7px 0 3px}
.nb{flex:1;text-align:center;cursor:pointer;padding:5px 3px;position:relative}
.ni{font-size:20px;margin-bottom:2px}
.nl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.nb.ag .nl{color:var(--g)}.nb.aa .nl{color:var(--a)}.nb.ap .nl{color:var(--p)}
.nbadge{position:absolute;top:2px;right:calc(50% - 14px);background:#ef4444;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:50px 20px}
.ei{font-size:56px;margin-bottom:12px}

// ── AUTH FORM ────────────────────────────────────────────

  const[phone,setPhone]=useState('');
  const[shopName,setShopName]=useState('');
  const[idNum,setIdNum]=useState('');
  const[loading,setLoading]=useState(false);
  const isShop=role.id==='shop',isRider=role.id==='rider';
  const accent=isShop?'btn-a':isRider?'btn-p':'btn-g';
  const accentColor=isShop?'var(--a)':isRider?'var(--p)':'var(--g)';
  const submit=async()=>{
    if(!phone||phone.length<9){alert('Enter valid phone number');return;}
    if(!isLogin&&!name.trim()){alert('Enter your name');return;}
    setLoading(true);
    const userData={role:role.id,name:(name||phone).trim(),phone:phone.trim(),shopName:shopName.trim(),idNum:idNum.trim(),total_earnings:0,orders_completed:0,preferred_rider:null,favourite_shops:[]};

    <div class="fi">${role.icon}</div>
    <div class="ft" style=${{color:accentColor}}>${isLogin?'Welcome back':'Join as '+role.label}</div>

    <div class="fld"><label>Phone Number (M-Pesa)</label><input type="tel" placeholder="07XX XXX XXX" value=${phone} onInput=${e=>setPhone(e.target.value)}/></div>

  </div>`;
}

  const[delivOn,setDelivOn]=useState(false);

  useEffect(()=>{db.collection('shops').doc(user.phone).get().then(d=>{if(d.exists) setDelivOn(d.data().delivery_enabled||false);}).catch(()=>{});},[user.phone]);
  useEffect(()=>{
    if(tab!=='orders') return;
    const unsub=db.collection('delivery_orders').where('shop_id','==',user.phone).limit(50)
      .onSnapshot(s=>{setOrders(s.docs.map(d=>({id:d.id,...d.data()})).filter(o=>!['delivered','rejected'].includes(o.status)).sort((a,b)=>(b.created_at?.seconds||0)-(a.created_at?.seconds||0)));},()=>{});
    return()=>unsub();
  },[tab,user.phone]);
  const pending=orders.filter(o=>o.status==='placed').length;
  const confirmPay=async id=>{const c=(codes[id]||'').trim();if(!c||c.length<5){alert('Enter M-Pesa code from your SMS');return;}try{await db.collection('delivery_orders').doc(id).update({status:'confirmed',mpesa_code:c,confirmed_at:firebase.firestore.FieldValue.serverTimestamp()});showToast('✅ Confirmed! Notifying riders…');}catch(e){showToast('Error — check connection');}};
  const toggleDeliv=async()=>{const n=!delivOn;setDelivOn(n);try{await db.collection('shops').doc(user.phone).set({delivery_enabled:n,name:user.shopName||user.name,owner_phone:user.phone,location:'Chemelil',category:'General',icon:'🏪',distance_km:.5,rating:5.0,updated_at:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});showToast(n?'✅ Delivery ON — customers can see your shop':'Delivery paused');}catch(e){setDelivOn(!n);}};

    ${toast&&html`<div class="toast">${toast}</div>`}
    <div class="sh">

        <div><div style=${{fontSize:17,fontWeight:700}}>${user.shopName||user.name}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>CHAWKPRO × TUMANA · ${user.phone}</div></div>
        <button onClick=${()=>{if(confirm('Logout?')) onLogout();}} style=${{background:'none',border:'1px solid var(--br2)',borderRadius:8,padding:'5px 10px',color:'var(--t2)',fontSize:11,cursor:'pointer'}}>Out</button>
      </div>
      <div class="sgrid">
        <div class="scard"><div class="sv" style=${{color:'var(--a)'}}>KSh 8,450</div><div class="slbl">Today Sales</div></div>
        <div class="scard"><div class="sv" style=${{color:'var(--g)'}}>${orders.filter(o=>o.status==='transit').length}</div><div class="slbl">Out for Delivery</div></div>
      </div>
      <div class="tog-strip">
        <div><div style=${{fontWeight:700,fontSize:13,color:delivOn?'var(--g)':'var(--t2)'}}>${delivOn?'🟢 Accepting Delivery Orders':'🔴 Delivery Off'}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>${delivOn?'Customers see your shop on Tumana':'Toggle to receive Tumana orders'}</div></div>
        <div class=${`tog-track ${delivOn?'on':''}`} onClick=${toggleDeliv}><div class="tog-thumb"/></div>
      </div>
    </div>
    <div class="shop-tabs">
      ${[['orders','📋 Orders'],['sales','💰 Sales'],['stock','📦 Stock'],['settings','⚙️']].map(([k,l])=>html`<div key=${k} class=${`stab ${tab===k?'act':''}`} onClick=${()=>setTab(k)}>${l}${k==='orders'&&pending>0?html`<span style=${{background:'#ef4444',color:'#fff',borderRadius:'50%',padding:'0 4px',fontSize:9,marginLeft:3}}>${pending}</span>`:''}</div>`)}
    </div>
    <div class="scr">
      ${tab==='orders'&&html`<div style=${{padding:'10px 18px 100px'}}>
        ${orders.length===0?html`<${Empty} icon="📋" title=${delivOn?'No orders yet':'Delivery is Off'} sub=${delivOn?'Tumana orders appear here instantly':'Enable delivery above'}/>`:orders.map(o=>html`<div key=${o.id} class="do-card">
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <div><div style=${{fontWeight:700}}>#${o.id.slice(-6).toUpperCase()}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>${o.customer_name} · ${o.customer_phone}</div></div>
            <span class=${`spill ${SP[o.status]?.cls||'s1'}`}>${statusLabel[o.status]||o.status}</span>
          </div>
          <div style=${{fontSize:12,color:'var(--t2)',marginBottom:8}}>${(o.items||[]).map(i=>i.name+' ×'+i.quantity).join(' · ')}</div>

          ${o.rider_name&&html`<div style=${{background:'rgba(139,92,246,.06)',border:'1px solid rgba(139,92,246,.14)',borderRadius:8,padding:9,fontSize:12,color:'var(--p)',marginTop:6}}>🏍️ ${o.rider_name} · ${o.rider_phone}</div>`}
        </div>`)}
      </div>`}
      ${tab!=='orders'&&html`<${Empty} icon=${tab==='sales'?'💰':tab==='stock'?'📦':'⚙️'} title=${tab==='sales'?'Sales Dashboard':tab==='stock'?'Stock Management':'Settings'} sub="Connected to CHAWKPRO data · Coming in next update"/>`}
    </div>

    </div>
  </>`;

// ── RIDER DASHBOARD ──────────────────────────────────────
function RiderDashboard({user,onLogout}){
  const[online,setOnline]=useState(false);
  const[jobs,setJobs]=useState([]);
  const[active,setActive]=useState(null);
  const[earned,setEarned]=useState(0);
  const[toast,showToast]=useToast();
  useEffect(()=>{
    if(!online){setJobs([]);return;}
    const unsub=db.collection('delivery_orders').where('status','in',['confirmed','placed']).limit(20)
      .onSnapshot(s=>{setJobs(s.docs.map(d=>({id:d.id,...d.data()})).filter(j=>!j.rider_phone));},()=>{setJobs([{id:'dj1',type:'shop',shopName:"Mama Jane's",shopLocation:'Chemelil Center',customer_name:'John K.',delivery_address:'Near Hospital',distance:.8,delivery_fee:70,total:550,status:'confirmed'},{id:'dj2',type:'pickup',pickup_from:'Stage Area',delivery_address:'Market',item_description:'2 mandazi from Mama Safi',distance:.5,delivery_fee:60,total:60,status:'placed',customer_name:'Mary W.'}]);});
    return()=>unsub();
  },[online]);
  useEffect(()=>{
    if(!user?.phone) return;
    const unsub=db.collection('delivery_orders').where('rider_phone','==',user.phone).limit(10)
      .onSnapshot(s=>{const a=s.docs.map(d=>({id:d.id,...d.data()})).find(d=>['assigned','heading','picked','transit'].includes(d.status));setActive(a||null);},()=>setActive(null));
    return()=>unsub();
  },[user?.phone]);
  const riderGets=j=>Math.round((j.delivery_fee||70)*.9);
  const accept=async job=>{
    try{await db.collection('delivery_orders').doc(job.id).update({rider_phone:user.phone,rider_name:user.name,status:'assigned',assigned_at:firebase.firestore.FieldValue.serverTimestamp()});}
    catch(e){setActive({...job,status:'assigned',rider_name:user.name,rider_phone:user.phone});}
    setJobs(p=>p.filter(j=>j.id!==job.id));
    showToast('✅ Accepted! Head to '+(job.type==='pickup'?job.pickup_from:job.shopName));
  };
  const nextSt={assigned:'heading',heading:'picked',picked:'transit',transit:'delivered'};
  const nextLb={assigned:'🔍 Heading to Pickup',heading:'📦 Picked Up',picked:'🚴 Out for Delivery',transit:'✅ Mark Delivered'};
  const advance=async()=>{
    if(!active) return;
    const ns=nextSt[active.status];if(!ns) return;
    try{await db.collection('delivery_orders').doc(active.id).update({status:ns,[ns+'_at']:firebase.firestore.FieldValue.serverTimestamp()});}
    catch(e){setActive(p=>({...p,status:ns}));}
    if(ns==='delivered'){const e=riderGets(active);setEarned(p=>p+e);try{await db.collection('riders').doc(user.phone).update({total_earnings:firebase.firestore.FieldValue.increment(e),orders_completed:firebase.firestore.FieldValue.increment(1)});}catch(er){}setActive(null);showToast('🎉 Delivered! KSh '+e+' earned');}
  };
  const toggleOnline=()=>{const n=!online;setOnline(n);db.collection('riders').doc(user.phone).set({online:n,name:user.name,phone:user.phone},{merge:true}).catch(()=>{});showToast(n?'🟢 Online — receiving jobs':'🔴 Offline');};
  const progKeys=['assigned','heading','picked','transit','delivered'];
  return html`<>
    ${toast&&html`<div class="toast">${toast}</div>`}
    <div class="rh">
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style=${{fontSize:18,fontWeight:700}}>Hey ${(user.name||'Rider').split(' ')[0]}! 🏍️</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>${user.phone} · Tumana Rider</div></div>
        <button onClick=${()=>{if(confirm('Logout?')) onLogout();}} style=${{background:'none',border:'1px solid var(--br2)',borderRadius:8,padding:'5px 10px',color:'var(--t2)',fontSize:11,cursor:'pointer'}}>Out</button>
      </div>
      <div class="r-tog">
        <div><div style=${{fontWeight:700,color:online?'var(--g)':'var(--t2)'}}>${online?'🟢 Online — Receiving Jobs':'🔴 Offline'}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>${online?'Shop deliveries and pickup requests below':'Toggle to start earning'}</div></div>
        <div class=${`tog-track ${online?'on':''}`} onClick=${toggleOnline}><div class="tog-thumb"/></div>
      </div>
    </div>
    <div class="scr">
      <div style=${{display:'flex',gap:8,padding:'10px 18px 0'}}>
        <div class="scard" style=${{flex:1}}><div class="sv" style=${{color:'var(--g)'}}>KSh ${earned}</div><div class="slbl">Today</div></div>
        <div class="scard" style=${{flex:1}}><div class="sv" style=${{color:'var(--p)'}}>${jobs.length}</div><div class="slbl">Available</div></div>
      </div>
      <div style=${{padding:'10px 18px 100px'}}>
        ${active&&html`<>
          <div style=${{fontSize:10,fontWeight:700,letterSpacing:1.5,color:'#ef4444',textTransform:'uppercase',marginBottom:8}}>🔴 Active Delivery</div>
          <div class="active-job">
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <div><div style=${{fontWeight:700,fontSize:14}}>${active.type==='pickup'?'🏍️ Pickup':'🛒 Delivery'} #${active.id.slice(-6).toUpperCase()}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>${active.shopName||active.item_description||''}</div></div>
              <div style=${{fontWeight:800,color:'var(--g)',fontSize:20}}>KSh ${riderGets(active)}</div>
            </div>
            <div style=${{display:'flex',alignItems:'center',gap:4,margin:'8px 0 10px'}}>
              ${progKeys.map((k,i)=>html`<React.Fragment key=${k}>
                <div style=${{width:22,height:22,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,background:progKeys.indexOf(active.status)>i?'var(--g)':progKeys.indexOf(active.status)===i?'var(--p)':'var(--c2)',color:progKeys.indexOf(active.status)>=i?'#000':'var(--t3)',border:progKeys.indexOf(active.status)===i?'none':'1.5px solid var(--br2)'}}>${progKeys.indexOf(active.status)>i?'✓':i+1}</div>
                ${i<progKeys.length-1&&html`<div style=${{flex:1,height:2,background:progKeys.indexOf(active.status)>i?'var(--g)':'var(--br2)'}}/>`}
              </React.Fragment>`)}
            </div>
            <div class="rr"><div class="rd rd-g">🏪</div><div><div style=${{fontSize:9,color:'var(--g)',fontWeight:700}}>PICKUP FROM</div><div style=${{fontWeight:700}}>${active.shopName||active.pickup_from||''}</div><div style=${{fontSize:11,color:'var(--t2)'}}>${active.shopLocation||active.pickup_from||''}</div></div></div>
            <div class="rr"><div class="rd rd-p">📍</div><div><div style=${{fontSize:9,color:'var(--p)',fontWeight:700}}>DELIVER TO</div><div style=${{fontWeight:700}}>${active.customer_name||''}</div><div style=${{fontSize:11,color:'var(--t2)'}}>${active.delivery_address||''}</div></div></div>
            ${active.item_description&&html`<div class="rr"><div class="rd rd-a">📝</div><div><div style=${{fontSize:9,color:'var(--a)',fontWeight:700}}>ITEM</div><div style=${{fontSize:13}}>${active.item_description}</div></div></div>`}
            ${nextSt[active.status]&&html`<button class="btn btn-g" style=${{marginTop:10}} onClick=${advance}>${nextLb[active.status]}</button>`}
          </div>
        </>`}
        ${!online?html`<${Empty} icon="😴" title="You're Offline" sub="Toggle Online above to receive shop deliveries and pickup requests"/>`:
          jobs.length===0&&!active?html`<${Empty} icon="⏳" title="No jobs yet" sub="Shop deliveries and pickup requests appear here when confirmed"/>`:
          html`<>
            ${jobs.length>0&&html`<div style=${{fontSize:10,fontWeight:700,letterSpacing:1.5,color:'var(--p)',textTransform:'uppercase',marginBottom:8}}>🔔 ${jobs.length} Available Job${jobs.length!==1?'s':''}</div>`}
            ${jobs.map(job=>html`<div key=${job.id} class="job-card">
              ${job.type==='pickup'?html`<div class="pu-tag">PICKUP REQUEST</div>`:html`<div class="new-badge">SHOP DELIVERY</div>`}
              <div style=${{display:'flex',justifyContent:'space-between',marginBottom:10,paddingRight:90}}>
                <div><div style=${{fontWeight:700}}>${job.type==='pickup'?'Pickup & Drop':'Shop Delivery'}</div><div style=${{fontSize:11,color:'var(--t2)',marginTop:2}}>#${job.id.slice(-6).toUpperCase()}</div></div>
                <div style=${{textAlign:'right'}}><div style=${{fontSize:20,fontWeight:800,color:'var(--g)'}}>KSh ${riderGets(job)}</div><div style=${{fontSize:9,color:'var(--t2)'}}>your cut</div></div>
              </div>
              <div class="rr"><div class=${`rd ${job.type==='pickup'?'rd-a':'rd-g'}`}>${job.type==='pickup'?'📍':'🏪'}</div><div><div style=${{fontSize:9,color:job.type==='pickup'?'var(--a)':'var(--g)',fontWeight:700}}>${job.type==='pickup'?'PICKUP FROM':'SHOP'}</div><div style=${{fontWeight:700}}>${job.type==='pickup'?job.pickup_from:job.shopName}</div>${job.type==='pickup'&&html`<div style=${{fontSize:11,color:'var(--t2)'}}>${job.item_description}</div>`}${job.type==='shop'&&html`<div style=${{fontSize:11,color:'var(--t2)'}}>${job.shopLocation||''}</div>`}</div></div>
              <div class="rr"><div class="rd rd-p">📍</div><div><div style=${{fontSize:9,color:'var(--p)',fontWeight:700}}>DELIVER TO</div><div style=${{fontWeight:700}}>${job.customer_name}</div><div style=${{fontSize:11,color:'var(--t2)'}}>${job.delivery_address}</div></div></div>
              <div class="earn-hl"><span style=${{fontSize:12,color:'var(--t2)'}}>${job.distance}km · KSh ${job.delivery_fee} fee</span><span style=${{fontWeight:800,color:'var(--g)'}}>You: KSh ${riderGets(job)}</span></div>
              ${job.preferred_rider?.phone===user.phone&&html`<div style=${{background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.2)',borderRadius:8,padding:'7px 9px',fontSize:11,color:'var(--a)',marginBottom:7}}>⭐ This customer chose you as their favourite rider!</div>`}
              <div class="jbtns"><button class="btn-dec">❌ Decline</button><button class="btn-acc" onClick=${()=>accept(job)}>✅ Accept</button></div>
            </div>`)}
          </>`}
      </div>
    </div>
    <div class="bnav">
      <div class="nb ap"><div class="ni">🏍️</div>${jobs.length>0?html`<div class="nbadge">${jobs.length}</div>`:''}<div class="nl">Jobs</div></div>
      <div class="nb"><div class="ni">💰</div><div class="nl">Earnings</div></div>
    </div>
  </>`;
}

// ── ROOT ─────────────────────────────────────────────────
function Root(){
  const[user,setUser]=useState(()=>{
    try{
      const s=localStorage.getItem('tumana_user');
      if(!s) return null;
      const p=JSON.parse(s);
      if(!p||!p.role||!p.phone) return null;
      // Ensure name always exists
      if(!p.name) p.name=p.phone;
      return p;
    }catch(e){localStorage.removeItem('tumana_user');return null;}
  });
  const login=u=>{if(!u.name) u.name=u.phone;setUser(u);localStorage.setItem('tumana_user',JSON.stringify(u));};
  const logout=()=>{setUser(null);try{localStorage.removeItem('tumana_user');}catch(e){}};
  if(user&&!['customer','shop','rider'].includes(user.role)){localStorage.removeItem('tumana_user');return html`<div class="app"><${RoleScreen} onLogin=${login}/></div>`;}
  const accent=!user?'var(--g)':user.role==='shop'?'var(--a)':user.role==='rider'?'var(--p)':'var(--g)';
  const label=!user?'CHAWKPRO × TUMANA':user.role==='shop'?'🏪 CHAWKPRO':user.role==='rider'?'🏍️ RIDER':'🛍️ TUMANA';
  return html`<div class="app">
    <div class="sb">
      <span>9:41</span>
      <span style=${{color:accent}}>${label}</span>
      <span style=${{cursor:'pointer',fontSize:11,color:'var(--t3)'}} onClick=${()=>{localStorage.clear();setUser(null);}}>↺</span>
    </div>
    ${!user&&html`<div style=${{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}><${RoleScreen} onLogin=${login}/></div>`}
    ${user?.role==='customer'&&html`<${CustomerApp} user=${user} onLogout=${logout}/>`}
    ${user?.role==='shop'&&html`<${ShopDashboard} user=${user} onLogout=${logout}/>`}
    ${user?.role==='rider'&&html`<${RiderDashboard} user=${user} onLogout=${logout}/>`}
  </div>`;
}

// ── MOUNT ─────────────────────────────────────────────────
window.addEventListener('load',()=>{
  setTimeout(()=>{
    try{
      ReactDOM.render(React.createElement(Root),document.getElementById('root'));
      document.getElementById('loading').style.display='none';
      document.getElementById('root').style.display='';
    }catch(e){
      document.getElementById('loading').innerHTML='<div style="padding:24px;text-align:center"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-size:15px;font-weight:700;color:#ff6b6b;margin-bottom:8px">Error: '+e.message+'</div><button onclick="localStorage.clear();location.reload()" style="background:#10b981;border:none;color:#000;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">🔄 Clear & Reload</button></div>';
    }
  },200);
});
</script>
</body>
</html>
