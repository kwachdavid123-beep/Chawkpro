<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CHAWKPRO × TUMANA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#08080c}
body{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:15px}
:root{
  --g:#10b981;--g2:#059669;
  --a:#f59e0b;--p:#8b5cf6;
  --bg:#08080c;--c:#111116;--c2:#1a1a22;
  --br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.13);
  --t2:rgba(255,255,255,0.45);--t3:rgba(255,255,255,0.2);
}
.app{width:100%;max-width:430px;height:100%;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.8);overflow:hidden}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page::-webkit-scrollbar{display:none}
.sb{background:#000;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
.bnav{display:flex;background:#000;border-top:1px solid var(--br);flex-shrink:0;padding:7px 0 3px}
.nb{flex:1;text-align:center;cursor:pointer;padding:5px 2px;position:relative;user-select:none}
.nb-icon{font-size:20px;margin-bottom:2px}
.nb-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.nb.act .nb-label{color:var(--g)}
.nb.act-a .nb-label{color:var(--a)}
.nb.act-p .nb-label{color:var(--p)}
.badge{position:absolute;top:2px;right:calc(50% - 14px);background:#ef4444;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
/* LOADING */
#loading{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
/* ROLE SCREEN */
.rs-hero{padding:28px 20px 16px}
.rs-eye{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--t2);text-transform:uppercase;margin-bottom:12px}
.rs-h{font-size:30px;font-weight:800;line-height:1.1;margin-bottom:6px}
.rs-sub{font-size:13px;color:var(--t2);line-height:1.5;margin-top:6px}
.rs-tabs{display:flex;margin:0 20px 16px;background:var(--c);border-radius:12px;padding:4px;gap:4px}
.rtab{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:var(--t2);transition:.2s}
.rtab.tg{background:linear-gradient(135deg,#10b981,#059669);color:#000}
.rtab.ta{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.rs-cards{padding:0 20px 80px;display:flex;flex-direction:column;gap:10px}
.rc{background:var(--c);border:1.5px solid var(--br);border-radius:15px;padding:16px;cursor:pointer;position:relative;transition:.15s}
.rc:active{transform:scale(.98)}
.rc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rc-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.ico-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.ico-a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.ico-p{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.rc-name{font-size:16px;font-weight:700;margin-bottom:2px}
.rc-sub{font-size:11px;color:var(--t2)}
.perk{font-size:12px;color:var(--t2);margin:3px 0;display:flex;align-items:center;gap:6px}
.rc-arr{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3)}
/* FORM */
.form-inner{padding:20px 20px 80px}
.bk{display:inline-flex;align-items:center;gap:6px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px}
.fi{font-size:40px;margin-bottom:10px}
.ft{font-size:22px;font-weight:700;margin-bottom:6px}
.fs{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--c2);border:1.5px solid var(--br2);border-radius:10px;padding:13px;font-size:15px;color:#fff;font-family:'Space Grotesk',sans-serif}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--g)}
.fld input::placeholder,.fld textarea::placeholder{color:var(--t3);font-size:13px}
.fld select option{background:#1a1a22}
.btn{width:100%;padding:15px;border-radius:10px;border:none;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-top:4px}
.btn:active{transform:scale(.98)}
.btn-g{background:linear-gradient(135deg,#10b981,#059669);color:#000}
.btn-a{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.btn-p{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.btn-ghost{background:transparent;border:1.5px solid var(--br2);color:var(--t2)}
.divd{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--t3);font-size:11px}
.divd::before,.divd::after{content:'';flex:1;height:1px;background:var(--br)}
/* HEADER */
.hdr{padding:14px 18px;border-bottom:1px solid var(--br)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.loc-pill{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);padding:7px 12px;border-radius:20px;font-size:12px;font-weight:700;color:var(--g)}
.ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;font-weight:800;color:#000}
.srch{background:var(--c);border:1.5px solid var(--br2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--t3);display:flex;gap:6px}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);padding:12px 18px 6px}
/* FAVS */
.favs-row{display:flex;gap:10px;overflow-x:auto;padding:0 18px 10px;scrollbar-width:none}
.favs-row::-webkit-scrollbar{display:none}
.fav-it{min-width:60px;text-align:center;cursor:pointer}
.fav-ring{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 5px;border:2px solid rgba(16,185,129,.3)}
.fav-nm{font-size:10px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px;margin:0 auto}
/* SHOP CARD */
.sc{background:var(--c);border:1.5px solid var(--br);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer}
.sc:active{transform:scale(.98)}
.sc-row{display:flex;gap:10px;align-items:center}
.sc-ico{width:50px;height:50px;border-radius:11px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:24px}
.sc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.sc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--br2);padding:3px 8px;border-radius:20px;font-size:11px;color:var(--t2);font-weight:600}
.chip-g{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.18);color:var(--g)}
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px}
/* PRODUCT GRID */
.prod-hdr{padding:12px 18px;border-bottom:1px solid var(--br)}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:var(--c2);border:1px solid var(--br2);border-radius:9px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;margin-bottom:12px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:11px 18px 80px}
.pc{background:var(--c);border:1.5px solid var(--br);border-radius:12px;overflow:hidden}
.pi{height:90px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:40px}
.pb{padding:10px}
.pn{font-size:12px;font-weight:700;margin-bottom:3px}
.pp{font-size:16px;font-weight:700;color:var(--g);margin-bottom:6px}
.add-btn{width:100%;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:7px;padding:8px;font-size:11px;font-weight:700;color:#000;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.qty-row{display:flex;align-items:center;justify-content:space-between}
.qb{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:700}
.qb-m{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.qb-p{background:rgba(16,185,129,.1);color:var(--g);border:1px solid rgba(16,185,129,.2)}
/* CART */
.cart-item{background:var(--c);border:1.5px solid var(--br);border-left:3px solid var(--g);border-radius:12px;padding:12px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.sum-box{background:rgba(16,185,129,.04);border:1.5px solid rgba(16,185,129,.13);border-radius:12px;padding:13px;margin:12px 0}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin:4px 0}
.sum-tot{font-size:16px;font-weight:700;color:var(--g);border-top:1px solid rgba(16,185,129,.18);padding-top:9px;margin-top:7px;display:flex;justify-content:space-between}
.flow-box{background:var(--c2);border:1px solid var(--br);border-radius:8px;padding:10px;margin-top:8px}
.flow-t{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g);margin-bottom:6px}
.flow-r{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin:3px 0}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;z-index:1000;display:none}
.overlay.show{display:flex}
.modal{background:linear-gradient(180deg,#141a18,#0d0d0f);border:1.5px solid rgba(16,185,129,.2);border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-height:85vh;overflow-y:auto}
.m-handle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:0 auto 16px}
.m-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:5px}
.m-sub{font-size:12px;color:var(--t2);text-align:center;margin-bottom:16px;line-height:1.6}
.pay-box{background:rgba(16,185,129,.05);border:1.5px solid rgba(16,185,129,.18);border-radius:12px;padding:13px;margin-bottom:12px}
.pay-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.pay-lbl{font-size:12px;color:var(--t2)}
.pay-val{font-size:15px;font-weight:700;color:var(--g)}
.steps{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.step{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--t2)}
.sn{width:18px;height:18px;border-radius:50%;background:var(--g);color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.two-btn{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
/* ORDERS */
.oc{background:var(--c);border:1.5px solid var(--br);border-radius:13px;padding:13px;margin-bottom:10px}
.oc-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:9px}
.spill{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.s1{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.s2{background:rgba(16,185,129,.1);color:var(--g);border:1px solid rgba(16,185,129,.2)}
.s3{background:rgba(139,92,246,.1);color:var(--p);border:1px solid rgba(139,92,246,.2)}
.s4{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.s5{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.s6{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
/* TRACKER */
.tracker{margin:10px 0 8px}
.tr-step{display:flex;gap:9px;align-items:flex-start}
.tr-left{display:flex;flex-direction:column;align-items:center;width:22px}
.tr-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.tr-dot.done{background:var(--g);color:#000;font-weight:800}
.tr-dot.active{background:var(--p);color:#fff}
.tr-dot.todo{background:var(--c2);color:var(--t3);border:1.5px solid var(--br2)}
.tr-line{width:2px;flex:1;min-height:10px;margin:2px 0}
.tr-line.done{background:var(--g)}.tr-line.todo{background:var(--br2)}
.tr-body{padding-bottom:10px;flex:1}
.rider-row{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);border-radius:8px;padding:9px;margin-top:7px;display:flex;align-items:center;gap:9px}
/* PICKUP */
.pu-hero{background:linear-gradient(135deg,#0d1f17,#1a0d30);border:1.5px solid rgba(139,92,246,.2);border-radius:14px;padding:18px;margin-bottom:16px}
.pu-badge{display:inline-block;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:var(--p);margin-bottom:8px}
.loc-f{background:var(--c2);border:1.5px solid var(--br2);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.loc-f input{background:transparent;border:none;font-size:14px;color:#fff;font-family:'Space Grotesk',sans-serif;flex:1;outline:none}
.loc-f input::placeholder{color:var(--t3);font-size:13px}
.ldot{width:10px;height:10px;border-radius:50%}
.ldot-g{background:var(--g)}.ldot-r{background:#ef4444}
.est-box{background:rgba(139,92,246,.06);border:1.5px solid rgba(139,92,246,.15);border-radius:10px;padding:12px;margin:10px 0;display:flex;gap:8px;align-items:center}
.est-it{flex:1;text-align:center}
.est-v{font-size:17px;font-weight:700;color:var(--p)}
.est-l{font-size:10px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.est-div{width:1px;height:32px;background:rgba(139,92,246,.2)}
/* SHOP DASHBOARD */
.sh{background:linear-gradient(180deg,#1f1500,var(--bg));padding:16px}
.sh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scard{background:var(--c2);border:1.5px solid var(--br);border-radius:12px;padding:12px}
.sv{font-size:20px;font-weight:700;margin-bottom:2px}
.slbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.tog-strip{display:flex;justify-content:space-between;align-items:center;background:rgba(16,185,129,.04);border:1.5px solid rgba(16,185,129,.12);border-radius:10px;padding:10px 12px;margin-top:10px}
.tog-track{width:46px;height:25px;border-radius:13px;background:#333;position:relative;cursor:pointer;transition:.3s}
.tog-track.on{background:var(--g)}
.tog-thumb{width:19px;height:19px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.3s;pointer-events:none}
.tog-track.on .tog-thumb{transform:translateX(21px)}
.shop-tabs{display:flex;background:var(--c);border-radius:10px;padding:3px;margin:10px 18px 0;gap:3px}
.stab{flex:1;padding:8px 4px;text-align:center;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;color:var(--t2)}
.stab.act{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.do-card{background:var(--c);border:1.5px solid var(--br);border-left:4px solid var(--g);border-radius:12px;padding:13px;margin-bottom:10px}
.mp-inp{width:100%;background:var(--c2);border:1.5px solid rgba(16,185,129,.22);border-radius:8px;padding:11px;font-size:14px;color:#fff;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;outline:none}
.mp-inp::placeholder{text-transform:none;letter-spacing:0;color:var(--t3)}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-rej{background:transparent;border:1.5px solid rgba(239,68,68,.35);color:#ef4444;padding:10px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.btn-cfm{background:linear-gradient(135deg,#10b981,#059669);border:none;color:#000;padding:10px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
/* RIDER */
.rh{background:linear-gradient(180deg,#110a20,var(--bg));padding:16px}
.r-tog{display:flex;justify-content:space-between;align-items:center;background:var(--c2);border:1.5px solid var(--br2);border-radius:12px;padding:12px 14px;margin-top:12px}
.job-card{background:var(--c);border:1.5px solid rgba(139,92,246,.22);border-radius:14px;padding:14px;margin-bottom:10px;position:relative}
.new-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.pu-tag{position:absolute;top:10px;right:10px;background:rgba(245,158,11,.15);color:var(--a);border:1px solid rgba(245,158,11,.25);font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.rr{display:flex;gap:9px;margin:8px 0;align-items:flex-start}
.rd{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.rd-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.rd-p{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.rd-a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.earn-hl{background:rgba(16,185,129,.05);border:1.5px solid rgba(16,185,129,.13);border-radius:9px;padding:9px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.jbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.btn-dec{background:transparent;border:1.5px solid rgba(239,68,68,.3);color:#ef4444;padding:9px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.btn-acc{background:linear-gradient(135deg,#10b981,#059669);border:none;color:#000;padding:9px;border-radius:8px;font-weight:700;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer}
.active-job{background:var(--c);border:2px solid var(--g);border-radius:14px;padding:14px;margin-bottom:12px}
/* MISC */
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:56px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--t2);line-height:1.6}
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.sbox{background:var(--c);border:1.5px solid var(--br);border-radius:12px;padding:12px;margin-bottom:10px}
.sbox-t{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:10px}
.out-btn{background:none;border:1px solid var(--br2);border-radius:8px;padding:5px 10px;color:var(--t2);font-size:11px;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.profile-hdr{background:linear-gradient(135deg,#0d1f17,var(--bg));border:1.5px solid rgba(16,185,129,.15);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}

let _tu;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(_tu); _tu=setTimeout(()=>t.style.display='none',2800);
}
function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') e.className=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c!=null&&c!==false&&c!==undefined) e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}
function empty(icon,title,sub){
  return el('div',{className:'empty'},[
    el('div',{className:'empty-icon'},[icon]),
    el('div',{className:'empty-title'},[title]),
    el('div',{className:'empty-sub'},[sub])

}

// SHOP PRODUCTS
function showShopProducts(shopId){
  CURRENTSHOP=SHOPS.find(s=>s.id===shopId)||MOCK_SHOPS.find(s=>s.id===shopId)||MOCK_SHOPS[0];
  setNav('customer','home');
  document.getElementById('main').innerHTML=`
    <div class="prod-hdr">
      <div class="back-btn" onclick="showCustomerHome()">← All Shops</div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="sc-ico" style="width:44px;height:44px;font-size:20px">${CURRENTSHOP.icon||'🏪'}</div>
        <div><div style="font-size:16px;font-weight:700">${CURRENTSHOP.name}</div><div style="font-size:11px;color:var(--t2)">${CURRENTSHOP.location} · ${CURRENTSHOP.category}</div></div>
      </div>
    </div>
    <div id="prod-grid" class="pg"><div style="text-align:center;padding:40px;grid-column:1/-1"><div class="spinner" style="margin:0 auto"></div></div></div>`;
  db.collection('shops').doc(shopId).collection('stock').where('selling_price','>',0)
    .get().then(s=>{
      let prods=s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.quantity>0);
      if(!prods.length) prods=MOCK_PRODS[shopId]||MOCK_PRODS.s1||[];
      renderProducts(prods);
    }).catch(()=>renderProducts(MOCK_PRODS[shopId]||MOCK_PRODS.s1||[]));
}
function renderProducts(prods){
  const grid=document.getElementById('prod-grid');
  if(!grid) return;
  grid.innerHTML=prods.map(p=>{
    const qty=CART.find(c=>c.id===p.id)?.quantity||0;
    return `<div class="pc">
      <div class="pi">${p.emoji||'🛒'}</div>
      <div class="pb">
        <div class="pn">${p.name}</div>
        <div class="pp">KSh ${p.selling_price}</div>
        ${qty>0
          ?`<div class="qty-row"><button class="qb qb-m" onclick="addProd('${p.id}','${p.name}',${p.selling_price},-1,${CURRENTSHOP?.distance_km||.5})">−</button><span style="font-weight:700">${qty}</span><button class="qb qb-p" onclick="addProd('${p.id}','${p.name}',${p.selling_price},1,${CURRENTSHOP?.distance_km||.5})">+</button></div>`
          :`<button class="add-btn" onclick="addProd('${p.id}','${p.name}',${p.selling_price},1,${CURRENTSHOP?.distance_km||.5})">Add +</button>`}
      </div>
    </div>`;
  }).join('');
}
function addProd(id,name,price,ch,dist){
  if(!CURRENTSHOP) return;
  const idx=CART.findIndex(i=>i.id===id);
  if(idx>=0){
    CART[idx].quantity+=ch;
    if(CART[idx].quantity<=0) CART.splice(idx,1);
  } else {
    if(ch<1) return;
    if(CART.length&&CART[0].shopId!==CURRENTSHOP.id){
      if(!confirm('Clear cart from '+CART[0].shopName+'?')) return;
      CART=[];
    }
    CART.push({id,name,selling_price:price,quantity:1,shopId:CURRENTSHOP.id,shopName:CURRENTSHOP.name,shopDist:dist});
  }
  if(ch>0) toast('Added '+name);
  showShopProducts(CURRENTSHOP.id);
}

function renderOrders(orders){
  const list=document.getElementById('orders-list');
  if(!list) return;
  if(!orders.length){list.innerHTML=empty('📦','No orders yet','Shop orders and pickup requests appear here').outerHTML;return;}
  list.innerHTML=orders.map(o=>{
    const sp=SP[o.status]||SP.placed;
    const flow=SF[o.type||'shop'];
    const curIdx=flow.indexOf(o.status);
    const trackerHtml=flow.map((key,i)=>{
      const isDone=i<curIdx,isAct=i===curIdx,isLast=i===flow.length-1;
      const info=SL[key]||{};
      const label=info[o.type||'shop']||key;
      return `<div class="tr-step">
        <div class="tr-left">
          <div class="tr-dot ${isDone?'done':isAct?'active':'todo'}">${isDone?'✓':info.icon||'•'}</div>
          ${!isLast?`<div class="tr-line ${isDone?'done':'todo'}"></div>`:''}
        </div>
        <div class="tr-body"><div class="tr-name" style="color:${isDone?'var(--g)':isAct?'#fff':'var(--t2)'}">${label}</div>${isAct?'<div class="tr-time">Now</div>':isDone?'<div class="tr-time" style="color:var(--g)">Done ✓</div>':''}</div>
      </div>`;}).join('');
    const itemsText=o.type==='pickup'?((o.pickup_from||'')+' → '+(o.delivery_address||'')):(o.items||[]).map(i=>i.name+' ×'+i.quantity).join(' · ');

    const riderHtml=o.rider_name?`<div class="rider-row"><div style="font-size:20px">🏍️</div><div><div style="font-weight:700;font-size:13px">${o.rider_name}</div><div style="font-size:11px;color:var(--t2)">${o.rider_phone}</div></div><div style="margin-left:auto;text-align:center"><button style="background:none;border:none;font-size:18px;cursor:pointer" onclick="saveFavRider('${o.rider_name}','${o.rider_phone}')">${isFavRider?'⭐':'☆'}</button><div style="font-size:9px;color:var(--t2)">${isFavRider?'Saved':'Save'}</div></div></div>`:'';
    return `<div class="oc">
      <div class="oc-head"><div><div style="font-weight:700;font-size:14px">${o.type==='pickup'?'🏍️ Pickup':'🛒 Order'} #${o.id.slice(-6).toUpperCase()}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${o.shopName||o.pickup_from||'Order'}</div></div><span class="spill ${sp.cls}">${sp.label}</span></div>

      <div style="font-size:12px;color:var(--t2);margin-bottom:5px">${itemsText}</div>
      <div style="font-weight:700;color:var(--g)">KSh ${o.total}</div>
      ${riderHtml}
    </div>`;
  }).join('');
}

function selectDist(el,km,fee){

  document.querySelectorAll('.dist-opt').forEach(d=>{

    d.style.borderColor='var(--br)';
    d.querySelector('div:last-child div:first-child').style.color='#fff';
  });
  // Select clicked
  el.style.background='rgba(16,185,129,.08)';
  el.style.borderColor='var(--g)';
  el.querySelector('div:last-child div:first-child').style.color='var(--g)';
  // Update summary
  document.getElementById('pu-fee-display').textContent='KSh '+fee;
  document.getElementById('pu-fee-pay').textContent='KSh '+fee;
  window._puDist=km;
  window._puFee=fee;
}

        <span class="spill ${SP[o.status]?.cls||'s1'}">${STATUS_LABELS_SHOP[o.status]||o.status}</span>
      </div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:8px">${(o.items||[]).map(i=>i.name+' ×'+i.quantity).join(' · ')}</div>
      <div style="display:flex;gap:7px;margin-bottom:8px">
        <div style="flex:1;background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.13);border-radius:8px;padding:8px 9px;text-align:center"><div style="font-size:9px;color:var(--t2);margin-bottom:2px">YOU EARN</div><div style="font-weight:800;color:var(--g)">KSh ${o.subtotal||0}</div></div>
        <div style="flex:1;background:var(--c2);border-radius:8px;padding:8px 9px;text-align:center"><div style="font-size:9px;color:var(--t2);margin-bottom:2px">TOTAL PAID</div><div style="font-weight:800">KSh ${o.total||0}</div></div>
      </div>
      ${o.status==='placed'?`<input class="mp-inp" type="text" placeholder="M-Pesa code from SMS e.g. RGH456XYZ" oninput="shopMpesaCodes['${o.id}']=this.value.toUpperCase();this.value=this.value.toUpperCase()"/><div class="act-row"><button class="btn-rej">❌ Reject</button><button class="btn-cfm" onclick="confirmShopPay('${o.id}')">✅ Confirm</button></div>`:''}
      ${o.rider_name?`<div style="background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.14);border-radius:8px;padding:9px;font-size:12px;color:var(--p);margin-top:6px">🏍️ ${o.rider_name} · ${o.rider_phone}</div>`:''}
    </div>`).join('')}</div>`;
}
async function confirmShopPay(id){
  const code=(shopMpesaCodes[id]||'').trim();
  if(!code||code.length<5){toast('Enter M-Pesa code from your SMS');return;}
  try{
    await db.collection('delivery_orders').doc(id).update({status:'confirmed',mpesa_code:code,confirmed_at:firebase.firestore.FieldValue.serverTimestamp()});
    toast('✅ Confirmed! Notifying riders…');
  }catch(e){toast('Error — check connection');}
}

// ══════════════════════════════════════════════════════════
// RIDER DASHBOARD
// ══════════════════════════════════════════════════════════
let riderOnline=false, riderJobsUnsub=null, riderActiveUnsub=null, riderJobs=[], riderActive=null, riderEarned=0;
const NEXT_ST={assigned:'heading',heading:'picked',picked:'transit',transit:'delivered'};
const NEXT_LB={assigned:'🔍 Heading to Pickup',heading:'📦 Picked Up',picked:'🚴 Out for Delivery',transit:'✅ Mark Delivered'};
function startRider(){showRiderDash();}
function showRiderDash(){
  setNav('rider','jobs');
  const letter=(USER.name||USER.phone||'?').charAt(0).toUpperCase();
  document.getElementById('main').innerHTML=`
    <div class="rh">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:18px;font-weight:700">Hey ${(USER.name||'Rider').split(' ')[0]}! 🏍️</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${USER.phone} · Tumana Rider</div></div>
        <button class="out-btn" onclick="if(confirm('Logout?')) logout()">Out</button>
      </div>
      <div class="r-tog">
        <div><div style="font-weight:700;color:${riderOnline?'var(--g)':'var(--t2)'}">${riderOnline?'🟢 Online — Receiving Jobs':'🔴 Offline'}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${riderOnline?'Shop deliveries and pickup requests below':'Toggle to start earning'}</div></div>
        <div class="tog-track ${riderOnline?'on':''}" onclick="toggleRiderOnline()"><div class="tog-thumb"></div></div>
      </div>
    </div>
    <div class="page" style="padding:10px 18px 100px">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="scard" style="flex:1"><div class="sv" style="color:var(--g)">KSh ${riderEarned}</div><div class="slbl">Today</div></div>
        <div class="scard" style="flex:1"><div class="sv" style="color:var(--p)" id="rider-jobs-count">${riderJobs.length}</div><div class="slbl">Available</div></div>
      </div>
      <div id="rider-content"></div>
    </div>`;
  renderRiderContent();
  if(riderOnline) listenRiderJobs();
  listenRiderActive();
}
function toggleRiderOnline(){
  riderOnline=!riderOnline;
  db.collection('riders').doc(USER.phone).set({online:riderOnline,name:USER.name,phone:USER.phone},{merge:true}).catch(()=>{});
  toast(riderOnline?'🟢 Online — receiving jobs':'🔴 Offline');
  if(riderOnline) listenRiderJobs(); else {if(riderJobsUnsub) riderJobsUnsub();riderJobs=[];}
  showRiderDash();
}
function listenRiderJobs(){
  if(riderJobsUnsub) riderJobsUnsub();
  riderJobsUnsub=db.collection('delivery_orders').where('status','in',['confirmed','placed']).limit(20)
    .onSnapshot(s=>{
      riderJobs=s.docs.map(d=>({id:d.id,...d.data()})).filter(j=>!j.rider_phone);
      const c=document.getElementById('rider-jobs-count');if(c) c.textContent=riderJobs.length;
      renderRiderContent();
    },()=>{
      riderJobs=[{id:'dj1',type:'shop',shopName:"Mama Jane's",shopLocation:'Chemelil Center',customer_name:'John K.',delivery_address:'Near Hospital',distance:.8,delivery_fee:70,total:550,status:'confirmed'},{id:'dj2',type:'pickup',pickup_from:'Stage Area',delivery_address:'Market',item_description:'2 mandazi from Mama Safi',distance:.5,delivery_fee:60,total:60,status:'placed',customer_name:'Mary W.'}];
      renderRiderContent();
    });
}
function listenRiderActive(){
  if(riderActiveUnsub) riderActiveUnsub();
  riderActiveUnsub=db.collection('delivery_orders').where('rider_phone','==',USER.phone).limit(10)
    .onSnapshot(s=>{
      riderActive=s.docs.map(d=>({id:d.id,...d.data()})).find(d=>['assigned','heading','picked','transit'].includes(d.status))||null;
      renderRiderContent();
    },()=>{riderActive=null;});
}
async function acceptJob(jobId){
  const job=riderJobs.find(j=>j.id===jobId);if(!job) return;
  try{
    await db.collection('delivery_orders').doc(jobId).update({rider_phone:USER.phone,rider_name:USER.name,status:'assigned',assigned_at:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){riderActive={...job,status:'assigned',rider_name:USER.name,rider_phone:USER.phone};riderJobs=riderJobs.filter(j=>j.id!==jobId);}
  toast('✅ Accepted! Head to '+(job.type==='pickup'?job.pickup_from:job.shopName));
  renderRiderContent();
}
async function advanceRider(){
  if(!riderActive) return;
  const ns=NEXT_ST[riderActive.status];if(!ns) return;
  try{
    await db.collection('delivery_orders').doc(riderActive.id).update({status:ns,[ns+'_at']:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){riderActive={...riderActive,status:ns};}
  if(ns==='delivered'){
    const e=Math.round((riderActive.delivery_fee||70)*.9);
    riderEarned+=e;
    try{await db.collection('riders').doc(USER.phone).update({total_earnings:firebase.firestore.FieldValue.increment(e),orders_completed:firebase.firestore.FieldValue.increment(1)});}catch(er){}
    riderActive=null;
    toast('🎉 Delivered! KSh '+e+' earned');
  }
  renderRiderContent();
}
const PROG_KEYS=['assigned','heading','picked','transit','delivered'];
function renderRiderContent(){
  const content=document.getElementById('rider-content');if(!content) return;
  let html='';
  if(riderActive){
    const a=riderActive;
    const curProg=PROG_KEYS.indexOf(a.status);
    const progDots=PROG_KEYS.map((k,i)=>{
      const done=i<curProg,act=i===curProg;
      return `<div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${done?'var(--g)':act?'var(--p)':'var(--c2)'};color:${done||act?'#000':'var(--t3)'};border:${act?'none':'1.5px solid var(--br2)'}">${done?'✓':i+1}</div>${i<PROG_KEYS.length-1?`<div style="flex:1;height:2px;background:${done?'var(--g)':'var(--br2)'}"></div>`:''}`;
    }).join('');
    html+=`<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#ef4444;text-transform:uppercase;margin-bottom:8px">🔴 Active Delivery</div>
    <div class="active-job">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-weight:700;font-size:14px">${a.type==='pickup'?'🏍️ Pickup':'🛒 Delivery'} #${a.id.slice(-6).toUpperCase()}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${a.shopName||a.item_description||''}</div></div>
        <div style="font-weight:800;color:var(--g);font-size:20px">KSh ${Math.round((a.delivery_fee||70)*.9)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin:8px 0 10px">${progDots}</div>
      <div class="rr"><div class="rd rd-g">🏪</div><div><div style="font-size:9px;color:var(--g);font-weight:700">PICKUP FROM</div><div style="font-weight:700">${a.shopName||a.pickup_from||''}</div><div style="font-size:11px;color:var(--t2)">${a.shopLocation||a.pickup_from||''}</div></div></div>
      <div class="rr"><div class="rd rd-p">📍</div><div><div style="font-size:9px;color:var(--p);font-weight:700">DELIVER TO</div><div style="font-weight:700">${a.customer_name||''}</div><div style="font-size:11px;color:var(--t2)">${a.delivery_address||''}</div></div></div>
      ${a.item_description?`<div class="rr"><div class="rd rd-a">📝</div><div><div style="font-size:9px;color:var(--a);font-weight:700">ITEM</div><div style="font-size:13px">${a.item_description}</div></div></div>`:''}
      ${NEXT_ST[a.status]?`<button class="btn btn-g" style="margin-top:10px" onclick="advanceRider()">${NEXT_LB[a.status]}</button>`:''}
    </div>`;
  }
  if(!riderOnline){
    html+=empty('😴','You\'re Offline','Toggle Online above to receive shop deliveries and pickup requests').outerHTML;
  } else if(!riderJobs.length&&!riderActive){
    html+=empty('⏳','No jobs yet','Shop deliveries and pickup requests appear here when confirmed').outerHTML;
  } else if(riderJobs.length){
    html+=`<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--p);text-transform:uppercase;margin-bottom:8px">🔔 ${riderJobs.length} Available Job${riderJobs.length!==1?'s':''}</div>`;
    html+=riderJobs.map(job=>{
      const rg=Math.round((job.delivery_fee||70)*.9);
      const isPref=USER.phone===job.preferred_rider?.phone;
      return `<div class="job-card">
        ${job.type==='pickup'?'<div class="pu-tag">PICKUP REQUEST</div>':'<div class="new-badge">SHOP DELIVERY</div>'}
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding-right:90px">
          <div><div style="font-weight:700">${job.type==='pickup'?'Pickup & Drop':'Shop Delivery'}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">#${job.id.slice(-6).toUpperCase()}</div></div>
          <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:var(--g)">KSh ${rg}</div><div style="font-size:9px;color:var(--t2)">your cut</div></div>
        </div>
        <div class="rr"><div class="rd ${job.type==='pickup'?'rd-a':'rd-g'}">${job.type==='pickup'?'📍':'🏪'}</div><div><div style="font-size:9px;color:${job.type==='pickup'?'var(--a)':'var(--g)'};font-weight:700">${job.type==='pickup'?'PICKUP FROM':'SHOP'}</div><div style="font-weight:700">${job.type==='pickup'?job.pickup_from:job.shopName}</div><div style="font-size:11px;color:var(--t2)">${job.type==='pickup'?job.item_description||'':job.shopLocation||''}</div></div></div>
        <div class="rr"><div class="rd rd-p">📍</div><div><div style="font-size:9px;color:var(--p);font-weight:700">DELIVER TO</div><div style="font-weight:700">${job.customer_name}</div><div style="font-size:11px;color:var(--t2)">${job.delivery_address}</div></div></div>
        <div class="earn-hl"><span style="font-size:12px;color:var(--t2)">${job.distance}km · KSh ${job.delivery_fee} fee</span><span style="font-weight:800;color:var(--g)">You: KSh ${rg}</span></div>
        ${isPref?`<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:7px 9px;font-size:11px;color:var(--a);margin-bottom:7px">⭐ This customer chose you as their favourite rider!</div>`:''}
        <div class="jbtns"><button class="btn-dec">❌ Decline</button><button class="btn-acc" onclick="acceptJob('${job.id}')">✅ Accept</button></div>
      </div>`;
    }).join('');
  }
  content.innerHTML=html;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  setTimeout(()=>{
    // Load saved user
    try{
      const saved=localStorage.getItem('tumana_user');
      if(saved){
        const p=JSON.parse(saved);
        if(p&&p.role&&p.phone){
          if(!p.name) p.name=p.phone;
          if(!['customer','shop','rider'].includes(p.role)) throw new Error('bad role');
          USER=p;
        }
      }
    }catch(e){localStorage.removeItem('tumana_user');USER=null;}
    // Show app
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    if(USER) startApp(); else showRoleScreen();
  },300);
});
</script>
</body>
</html>
