<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAWK Cashflow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50">
    <div class="text-center">
        <div class="w-32 h-32 mx-auto bg-yellow-400 text-black rounded-3xl flex items-center justify-center text-7xl font-bold mb-8 shadow-2xl border-4 border-white">CP</div>
        <h1 class="text-white text-5xl font-bold mb-2">CHAWK</h1>
        <p class="text-amber-400 text-xl mb-10">Personal Cashflow System</p>
        
        <input id="phone-input" type="tel" placeholder="Phone Number" class="w-72 p-5 text-lg border border-white/30 bg-white/10 text-white rounded-2xl mb-4 text-center">
        <input id="pin-input" type="password" maxlength="4" placeholder="4-digit PIN" class="w-72 p-5 text-4xl text-center border border-white/30 bg-white/10 text-white rounded-2xl mb-8 tracking-widest">
        
        <button onclick="handleAuth()" class="w-72 bg-yellow-400 hover:bg-yellow-300 text-black py-5 rounded-2xl text-xl font-semibold">Continue</button>
        <p class="text-white/70 text-sm mt-8">Demo: Any phone + any 4-digit PIN</p>
    </div>
</div>

<div id="main-app" class="max-w-4xl mx-auto bg-white shadow-xl min-h-screen hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-black to-gray-900 text-white p-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-yellow-400 text-black rounded-2xl flex items-center justify-center text-4xl font-bold">CP</div>
            <div>
                <h1 class="text-3xl font-bold">CHAWK</h1>
                <p class="text-amber-400 text-sm">Cashflow Tracker</p>
            </div>
        </div>
        <button onclick="saveDataManually()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-medium">💾 Save Data</button>
    </div>

    <!-- Month -->
    <div class="p-4 bg-white border-b">
        <select id="month-select" onchange="switchMonth()" class="w-full text-lg font-semibold p-3 border rounded-2xl"></select>
    </div>

    <!-- Tabs -->
    <div class="flex border-b bg-white overflow-x-auto">
        <button onclick="switchTab(0)" class="nav-tab active flex-1 py-4 text-sm">Daily Summary</button>
        <button onclick="switchTab(1)" class="nav-tab flex-1 py-4 text-sm">Daily Income</button>
        <button onclick="switchTab(2)" class="nav-tab flex-1 py-4 text-sm">Daily Expenses</button>
        <button onclick="switchTab(3)" class="nav-tab flex-1 py-4 text-sm">Assets & Liabilities</button>
        <button onclick="switchTab(4)" class="nav-tab flex-1 py-4 text-sm">Dashboard</button>
    </div>

    <div class="p-6 space-y-10">
        <!-- Daily Summary -->
        <div id="tab-0" class="tab-content active">
            <h2 class="text-2xl font-bold mb-6">Daily Summary</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="bg-emerald-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">MONEY IN</div>
                    <input id="daily-in" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="updateAll()">
                </div>
                <div class="bg-rose-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">MONEY OUT</div>
                    <input id="daily-out" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="updateAll()">
                </div>
                <div class="bg-amber-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">ASSET SPEND</div>
                    <input id="asset-spend" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="updateAll()">
                </div>
                <div class="bg-purple-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">LIABILITY SPEND</div>
                    <input id="liab-spend" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="updateAll()">
                </div>
                <div class="bg-blue-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">NET CASHFLOW</div>
                    <div id="daily-net" class="text-4xl font-bold">0.00</div>
                </div>
            </div>
        </div>

        <!-- Daily Income, Expenses, Assets & Liabilities, Dashboard (same structure) -->
        <!-- (Tables are initialized in script) -->
    </div>
</div>

<script>
    const incomeItems = ["Salary", "Farming", "Side Hustle", "Online Work", "Rental Income", "Business Sales", "Commissions", "Other"];
    const expenseItems = ["Rent", "Food", "Transport", "Fuel", "Utilities", "Medical", "Loan Payments", "Internet", "Betting", "Eating Out", "Impulse Spending", "Subscriptions", "Lifestyle Pressure", "Other"];
    const assetItems = ["Stocks", "Real Estate", "Business", "Cash", "Gold", "Other"];
    const liabilityItems = ["Loan", "Phone Debt", "SACCO Debt", "Motorbike Loan", "Credit Card", "Other"];

    let currentMonth = "2026-06";

    function handleAuth() {
        const phone = document.getElementById('phone-input').value.trim();
        const pin = document.getElementById('pin-input').value.trim();
        if (phone && pin.length === 4) {
            localStorage.setItem('chawkUser', JSON.stringify({phone, pin}));
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            loadData();
            initApp();
        } else {
            alert("Please enter phone number and 4-digit PIN");
        }
    }

    function initTable(tableId, items) {
        const table = document.getElementById(tableId);
        table.innerHTML = `<thead class="bg-gray-100"><tr><th class="p-4 text-left">Item</th><th class="p-4 text-right">Amount</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        items.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-4">${item}</td><td class="border p-4"><input type="number" step="0.01" value="0" class="w-full text-right" onchange="saveData()"></td>`;
            tbody.appendChild(tr);
        });
    }

    function calcDaily() {
        const inAmt = parseFloat(document.getElementById('daily-in').value) || 0;
        const outAmt = parseFloat(document.getElementById('daily-out').value) || 0;
        const net = inAmt - outAmt;
        document.getElementById('daily-net').textContent = net.toFixed(2);
    }

    function updateAll() {
        calcDaily();
        saveData();
    }

    function saveData() {
        const data = {
            dailyIn: document.getElementById('daily-in').value,
            dailyOut: document.getElementById('daily-out').value,
            assetSpend: document.getElementById('asset-spend').value,
            liabSpend: document.getElementById('liab-spend').value,
            income: Array.from(document.querySelectorAll('#income-table input')).map(i => i.value),
            expenses: Array.from(document.querySelectorAll('#expense-table input')).map(i => i.value),
            assets: Array.from(document.querySelectorAll('#asset-table input')).map(i => i.value),
            liabilities: Array.from(document.querySelectorAll('#liability-table input')).map(i => i.value)
        };
        localStorage.setItem('chawkData', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('chawkData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('daily-in').value = data.dailyIn || 0;
            document.getElementById('daily-out').value = data.dailyOut || 0;
            document.getElementById('asset-spend').value = data.assetSpend || 0;
            document.getElementById('liab-spend').value = data.liabSpend || 0;
            // Load tables (income, expenses, assets, liabilities)
        }
    }

    function saveDataManually() {
        saveData();
        alert("✅ All data saved successfully!");
    }

    function initApp() {
        initTable('income-table', incomeItems);
        initTable('expense-table', expenseItems);
        initTable('asset-table', assetItems);
        initTable('liability-table', liabilityItems);
        switchTab(0);
        calcDaily();
    }

    function populateMonths() {
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        for (let y = 2025; y <= 2027; y++) {
            for (let m = 1; m <= 12; m++) {
                const val = `\( {y}- \){String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (val === currentMonth) opt.selected = true;
                select.appendChild(opt);
            }
        }
    }

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${n}`).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===n));
    }

    function switchMonth() {
        currentMonth = document.getElementById('month-select').value;
    }

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        deferredPrompt = e;
        document.getElementById('installBtn').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) deferredPrompt.prompt();
    }

    window.onload = function() {
        populateMonths();
        if (localStorage.getItem('chawkUser')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            initApp();
            loadData();
        }
    };
</script>
</body>
</html>
