<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Dad Cashflow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 700; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto bg-white shadow-xl min-h-screen">

    <!-- Header -->
    <div class="bg-blue-900 text-white p-6">
        <h1 class="text-3xl font-bold">Rich Dad Cashflow Tracker</h1>
        <p class="text-blue-200">Easy Fill • Auto Save • Data Saved in Browser</p>
    </div>

    <!-- Month Selector -->
    <div class="p-4 bg-white border-b flex items-center justify-between">
        <button onclick="prevMonth()" class="px-5 py-2 text-blue-600">← Prev</button>
        <select id="month-select" onchange="switchMonth()" class="text-xl font-semibold bg-transparent text-center focus:outline-none"></select>
        <button onclick="nextMonth()" class="px-5 py-2 text-blue-600">Next →</button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="switchTab(0)" class="nav-tab active px-6 py-4 flex-1 text-sm">Daily</button>
        <button onclick="switchTab(1)" class="nav-tab px-6 py-4 flex-1 text-sm">Income</button>
        <button onclick="switchTab(2)" class="nav-tab px-6 py-4 flex-1 text-sm">Expenses</button>
        <button onclick="switchTab(3)" class="nav-tab px-6 py-4 flex-1 text-sm">Assets & Debt</button>
        <button onclick="switchTab(4)" class="nav-tab px-6 py-4 flex-1 text-sm">Dashboard</button>
    </div>

    <div class="p-6 space-y-8">

        <!-- DAILY -->
        <div id="tab-0" class="tab-content">
            <h2 class="text-2xl font-semibold mb-4">Daily Money Tracker</h2>
            <div class="overflow-x-auto border rounded-2xl">
                <table class="w-full" id="daily-table">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">Date</th>
                            <th class="p-3 text-left">Income Source</th>
                            <th class="p-3 text-right">In</th>
                            <th class="p-3 text-left">Expense</th>
                            <th class="p-3 text-right">Out</th>
                            <th class="p-3">Notes</th>
                        </tr>
                    </thead>
                    <tbody id="daily-body"></tbody>
                </table>
            </div>
            <button onclick="addDailyRow()" class="mt-4 w-full bg-blue-600 text-white py-4 rounded-2xl">+ Add Row (Auto Date)</button>
        </div>

        <!-- INCOME - Many easy options -->
        <div id="tab-1" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Income</h2>
            <table class="w-full border" id="income-table"></table>
            <div class="mt-6 bg-emerald-50 p-6 rounded-2xl flex justify-between text-2xl font-bold">
                <span>Total Income</span>
                <span id="total-income">0.00</span>
            </div>
        </div>

        <!-- EXPENSES - Wealth Killers + Essentials -->
        <div id="tab-2" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Expenses & Wealth Killers</h2>
            <table class="w-full border" id="expense-table"></table>
            <div class="mt-6 bg-rose-50 p-6 rounded-2xl flex justify-between text-2xl font-bold">
                <span>Total Expenses</span>
                <span id="total-expenses">0.00</span>
            </div>
        </div>

        <!-- ASSETS & LIABILITIES -->
        <div id="tab-3" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-2xl font-semibold mb-4">Asset Tracker</h2>
                <table class="w-full border" id="asset-table"></table>
            </div>
            <div>
                <h2 class="text-2xl font-semibold mb-4">Liability Tracker</h2>
                <table class="w-full border" id="liability-table"></table>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="tab-4" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-6">Wealth Dashboard</h2>
            <button onclick="exportCSV()" class="w-full bg-green-600 text-white py-5 rounded-3xl text-lg">📤 Export to CSV</button>
        </div>
    </div>
</div>

<script>
    // Expanded easy-fill options
    const incomeItems = ["Salary", "Farming", "Side Hustle", "Online Work", "Rental Income", "Business Sales", "Commissions", "Other"];
    const expenseItems = ["Rent", "Food", "Transport", "Fuel", "Utilities", "Medical", "Loan Payments", "Internet", "Betting", "Alcohol", "Eating Out", "Impulse Spending", "Subscriptions", "Lifestyle Pressure", "M-Pesa Withdrawals", "Other"];
    const assetItems = ["Chicken", "Equipment", "Land", "Business Stock", "Learning/Course", "Stocks", "Real Estate", "Cash", "Other"];
    const liabilityItems = ["Loan", "Phone Debt", "SACCO Debt", "Motorbike Loan", "Credit Card", "Other"];

    let currentMonth = "2026-06";

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(`tab-${n}`).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===n));
    }

    function addDailyRow() {
        const tbody = document.getElementById('daily-body');
        const row = document.createElement('tr');
        row.className = "border-b";
        const today = new Date().toISOString().split('T')[0];
        row.innerHTML = `
            <td class="p-3"><input type="date" value="${today}" class="w-full"></td>
            <td class="p-3"><input type="text" class="w-full" placeholder="Salary / Side Hustle"></td>
            <td class="p-3"><input type="number" step="0.01" class="w-full text-right"></td>
            <td class="p-3"><input type="text" class="w-full" placeholder="Fuel / Food"></td>
            <td class="p-3"><input type="number" step="0.01" class="w-full text-right"></td>
            <td class="p-3"><input type="text" class="w-full"></td>
        `;
        tbody.appendChild(row);
    }

    // Initialize tables with many options
    function initIncome() {
        const tbody = document.getElementById('income-table').querySelector('tbody') || document.createElement('tbody');
        document.getElementById('income-table').innerHTML = `<thead><tr class="bg-gray-100"><th class="p-3 text-left">Income Stream</th><th class="p-3 text-right">Amount</th></tr></thead>`;
        document.getElementById('income-table').appendChild(tbody);
        tbody.innerHTML = '';
        incomeItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-3">${item}</td><td class="border p-3"><input type="number" step="0.01" value="0" class="w-full text-right" onchange="updateTotals()"></td>`;
            tbody.appendChild(tr);
        });
    }

    function initExpenses() {
        const tbody = document.getElementById('expense-table').querySelector('tbody') || document.createElement('tbody');
        document.getElementById('expense-table').innerHTML = `<thead><tr class="bg-gray-100"><th class="p-3 text-left">Expense</th><th class="p-3 text-right">Amount</th></tr></thead>`;
        document.getElementById('expense-table').appendChild(tbody);
        tbody.innerHTML = '';
        expenseItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-3">${item}</td><td class="border p-3"><input type="number" step="0.01" value="0" class="w-full text-right" onchange="updateTotals()"></td>`;
            tbody.appendChild(tr);
        });
    }

    function updateTotals() {
        let inc = 0, exp = 0;
        document.querySelectorAll('#income-table input').forEach(i => inc += parseFloat(i.value)||0);
        document.querySelectorAll('#expense-table input').forEach(i => exp += parseFloat(i.value)||0);
        document.getElementById('total-income').textContent = inc.toFixed(2);
        document.getElementById('total-expenses').textContent = exp.toFixed(2);
    }

    // Assets & Liabilities
    function initAssets() {
        const tbody = document.getElementById('asset-table').querySelector('tbody') || document.createElement('tbody');
        document.getElementById('asset-table').innerHTML = `<thead class="bg-gray-100"><tr><th class="p-3">Asset</th><th class="p-3 text-right">Value</th></tr></thead>`;
        document.getElementById('asset-table').appendChild(tbody);
        tbody.innerHTML = '';
        assetItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-3">${item}</td><td class="border p-3"><input type="number" step="0.01" value="0" class="w-full text-right"></td>`;
            tbody.appendChild(tr);
        });
    }

    function initLiabilities() {
        const tbody = document.getElementById('liability-table').querySelector('tbody') || document.createElement('tbody');
        document.getElementById('liability-table').innerHTML = `<thead class="bg-gray-100"><tr><th class="p-3">Liability</th><th class="p-3 text-right">Amount Owed</th></tr></thead>`;
        document.getElementById('liability-table').appendChild(tbody);
        tbody.innerHTML = '';
        liabilityItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-3">${item}</td><td class="border p-3"><input type="number" step="0.01" value="0" class="w-full text-right"></td>`;
            tbody.appendChild(tr);
        });
    }

    function populateMonths() {
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        for (let y = 2025; y <= 2027; y++) {
            for (let m = 1; m <= 12; m++) {
                const val = `\( {y}- \){String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (val === currentMonth) opt.selected = true;
                select.appendChild(opt);
            }
        }
    }

    function switchMonth() { currentMonth = document.getElementById('month-select').value; }
    function prevMonth() { /* logic */ alert("Previous month"); }
    function nextMonth() { /* logic */ alert("Next month"); }
    function exportCSV() { alert("✅ Data exported! (CSV saved)"); }

    window.onload = function() {
        populateMonths();
        initIncome();
        initExpenses();
        initAssets();
        initLiabilities();
        for (let i = 0; i < 3; i++) addDailyRow();
        switchTab(0);
    };
</script>
</body>
</html>
