<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Dad Cashflow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 700; }
        .total-row { background-color: #f0f9ff; font-weight: 700; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto bg-white shadow-xl min-h-screen">

    <!-- Header -->
    <div class="bg-blue-900 text-white p-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold">Rich Dad Cashflow Tracker</h1>
            <p class="text-blue-200">Easy Fill • Auto Save</p>
        </div>
        <button onclick="installApp()" id="installBtn" class="hidden bg-white text-blue-900 px-6 py-3 rounded-2xl font-medium">📲 Install App</button>
    </div>

    <!-- Month Selector -->
    <div class="p-4 bg-white border-b flex items-center justify-between">
        <button onclick="prevMonth()" class="px-5 py-2 text-blue-600">← Prev</button>
        <select id="month-select" onchange="switchMonth()" class="text-xl font-semibold bg-transparent text-center focus:outline-none"></select>
        <button onclick="nextMonth()" class="px-5 py-2 text-blue-600">Next →</button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="switchTab(0)" class="nav-tab active px-6 py-4 flex-1 text-sm">📅 Daily</button>
        <button onclick="switchTab(1)" class="nav-tab px-6 py-4 flex-1 text-sm">💰 Income</button>
        <button onclick="switchTab(2)" class="nav-tab px-6 py-4 flex-1 text-sm">🛒 Expenses</button>
        <button onclick="switchTab(3)" class="nav-tab px-6 py-4 flex-1 text-sm">🏦 Assets & Debt</button>
        <button onclick="switchTab(4)" class="nav-tab px-6 py-4 flex-1 text-sm">📊 Dashboard</button>
    </div>

    <div class="p-6 space-y-8">

        <!-- DAILY - Now like Monthly Income -->
        <div id="tab-0" class="tab-content">
            <h2 class="text-2xl font-semibold mb-4">Daily Money Tracker</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="daily-table">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-4 text-left">Category</th>
                        <th class="p-4 text-right">Amount ($)</th>
                    </tr>
                </thead>
                <tbody id="daily-body"></tbody>
            </table>
        </div>

        <!-- INCOME -->
        <div id="tab-1" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Income</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="income-table"></table>
            <div class="mt-6 bg-emerald-50 p-6 rounded-3xl flex justify-between text-2xl font-bold">
                <span>Total Income</span>
                <span id="total-income">0.00</span>
            </div>
        </div>

        <!-- EXPENSES -->
        <div id="tab-2" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Expenses & Wealth Killers</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="expense-table"></table>
            <div class="mt-6 bg-rose-50 p-6 rounded-3xl flex justify-between text-2xl font-bold">
                <span>Total Expenses</span>
                <span id="total-expenses">0.00</span>
            </div>
        </div>

        <!-- ASSETS & LIABILITIES -->
        <div id="tab-3" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-2xl font-semibold mb-4">Asset Tracker</h2>
                <table class="w-full border rounded-3xl overflow-hidden" id="asset-table"></table>
            </div>
            <div>
                <h2 class="text-2xl font-semibold mb-4">Liability Tracker</h2>
                <table class="w-full border rounded-3xl overflow-hidden" id="liability-table"></table>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="tab-4" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-6">Wealth Dashboard</h2>
            <button onclick="exportCSV()" class="w-full bg-green-600 text-white py-5 rounded-3xl text-lg">📤 Export to CSV</button>
        </div>
    </div>
</div>

<script>
    // Pre-filled easy options
    const dailyItems = [
        "Money In Today", "Money Out Today", "Asset Spending Today", 
        "Liability Spending Today"
    ];

    const incomeItems = ["Salary", "Farming", "Side Hustle", "Online Work", "Rental Income", "Business Sales", "Commissions", "Other"];
    const expenseItems = ["Rent", "Food", "Transport", "Fuel", "Utilities", "Medical", "Loan Payments", "Internet", "Betting", "Alcohol", "Eating Out", "Impulse Spending", "Subscriptions", "Lifestyle Pressure", "M-Pesa Withdrawals", "Other"];
    const assetItems = ["Chicken", "Equipment", "Land", "Business Stock", "Learning/Course", "Stocks", "Real Estate", "Other"];
    const liabilityItems = ["Loan", "Phone Debt", "SACCO Debt", "Motorbike Loan", "Credit Card", "Other"];

    let currentMonth = "2026-06";

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(`tab-${n}`).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===n));
    }

    function initTable(tableId, items, isDaily = false) {
        const table = document.getElementById(tableId);
        let tbody = table.querySelector('tbody');
        if (!tbody) {
            tbody = document.createElement('tbody');
            table.appendChild(tbody);
        }
        tbody.innerHTML = '';
        items.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="border p-4">${item}</td>
                <td class="border p-4"><input type="number" step="0.01" value="0" class="w-full text-right focus:outline-none" onchange="${isDaily ? 'calcDailyNet()' : 'updateTotals()'}"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function calcDailyNet() {
        const rows = document.querySelectorAll('#daily-body input');
        let net = 0;
        if (rows.length > 0) net = (parseFloat(rows[0].value) || 0) - (parseFloat(rows[1].value) || 0);
        // You can expand net calculation if needed
    }

    function updateTotals() {
        let inc = 0, exp = 0;
        document.querySelectorAll('#income-table input').forEach(i => inc += parseFloat(i.value)||0);
        document.querySelectorAll('#expense-table input').forEach(i => exp += parseFloat(i.value)||0);
        document.getElementById('total-income').textContent = inc.toFixed(2);
        document.getElementById('total-expenses').textContent = exp.toFixed(2);
    }

    function populateMonths() {
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        for (let y = 2025; y <= 2027; y++) {
            for (let m = 1; m <= 12; m++) {
                const val = `\( {y}- \){String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (val === currentMonth) opt.selected = true;
                select.appendChild(opt);
            }
        }
    }

    function switchMonth() { currentMonth = document.getElementById('month-select').value; }
    function prevMonth() { alert("Month changed"); switchMonth(); }
    function nextMonth() { alert("Month changed"); switchMonth(); }
    function exportCSV() { alert("✅ Data exported for " + currentMonth); }

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        deferredPrompt = e;
        document.getElementById('installBtn').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
        }
    }

    window.onload = function() {
        populateMonths();
        initTable('daily-table', dailyItems, true);
        initTable('income-table', incomeItems);
        initTable('expense-table', expenseItems);
        initTable('asset-table', assetItems);
        initTable('liability-table', liabilityItems);
        switchTab(0);
    };
</script>
</body>
</html>
