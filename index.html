<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAWK Cashflow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
        <div class="w-28 h-28 mx-auto bg-yellow-400 text-black rounded-3xl flex items-center justify-center text-6xl font-bold mb-6">CP</div>
        <h1 class="text-3xl font-bold mb-2">CHAWK</h1>
        <p class="text-gray-600 mb-8">Enter Phone + PIN</p>
        <input id="phone-input" type="tel" placeholder="Phone Number" class="w-full p-4 border rounded-2xl mb-4">
        <input id="pin-input" type="password" maxlength="4" placeholder="4-digit PIN" class="w-full p-4 border rounded-2xl mb-6">
        <button onclick="handleAuth()" class="w-full bg-black text-white py-4 rounded-2xl text-lg">Continue</button>
        <p class="text-xs text-gray-500 mt-6">Demo: Any phone + 1234</p>
    </div>
</div>

<div id="main-app" class="max-w-4xl mx-auto bg-white shadow-xl min-h-screen hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-black to-gray-900 text-white p-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-yellow-400 text-black rounded-2xl flex items-center justify-center text-4xl font-bold">CP</div>
            <div>
                <h1 class="text-3xl font-bold">CHAWK</h1>
                <p class="text-amber-400">Cashflow Tracker</p>
            </div>
        </div>
        <button onclick="saveData()" class="bg-green-600 px-6 py-3 rounded-2xl text-white font-medium">💾 Save</button>
    </div>

    <!-- Month Selector -->
    <div class="p-4 bg-white border-b">
        <select id="month-select" onchange="switchMonth()" class="w-full text-lg font-semibold p-3 border rounded-2xl"></select>
    </div>

    <!-- Tabs -->
    <div class="flex border-b bg-white overflow-x-auto">
        <button onclick="switchTab(0)" class="nav-tab active flex-1 py-4 text-sm">Daily Summary</button>
        <button onclick="switchTab(1)" class="nav-tab flex-1 py-4 text-sm">Daily Income</button>
        <button onclick="switchTab(2)" class="nav-tab flex-1 py-4 text-sm">Daily Expenses</button>
        <button onclick="switchTab(3)" class="nav-tab flex-1 py-4 text-sm">Assets & Liabilities</button>
        <button onclick="switchTab(4)" class="nav-tab flex-1 py-4 text-sm">Dashboard</button>
    </div>

    <div class="p-6">

        <!-- Daily Summary -->
        <div id="tab-0" class="tab-content active">
            <h2 class="text-2xl font-bold mb-6">Daily Summary</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="bg-emerald-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">MONEY IN</div>
                    <input id="daily-in" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="calcDaily()">
                </div>
                <div class="bg-rose-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">MONEY OUT</div>
                    <input id="daily-out" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="calcDaily()">
                </div>
                <div class="bg-amber-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">ASSET SPEND</div>
                    <input id="asset-spend" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="calcDaily()">
                </div>
                <div class="bg-purple-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">LIABILITY SPEND</div>
                    <input id="liab-spend" type="number" step="0.01" value="0" class="w-full text-4xl font-bold text-center bg-transparent" onchange="calcDaily()">
                </div>
                <div class="bg-blue-50 p-6 rounded-3xl text-center">
                    <div class="text-xs text-gray-500">NET CASHFLOW</div>
                    <div id="daily-net" class="text-4xl font-bold">0.00</div>
                </div>
            </div>
        </div>

        <!-- Daily Income -->
        <div id="tab-1" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Daily Income</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="income-table"></table>
        </div>

        <!-- Daily Expenses -->
        <div id="tab-2" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Daily Expenses</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="expense-table"></table>
        </div>

        <!-- Assets & Liabilities -->
        <div id="tab-3" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Assets & Liabilities</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h3 class="font-bold mb-4">Assets</h3>
                    <table class="w-full border rounded-3xl overflow-hidden" id="asset-table"></table>
                </div>
                <div>
                    <h3 class="font-bold mb-4">Liabilities</h3>
                    <table class="w-full border rounded-3xl overflow-hidden" id="liability-table"></table>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="tab-4" class="tab-content">
            <h2 class="text-3xl font-bold mb-8 text-center">Wealth Dashboard</h2>
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 rounded-3xl mb-8 text-center">
                <div class="text-blue-200">NET WORTH</div>
                <div id="net-worth" class="text-5xl font-bold">0.00</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Items
    const incomeItems = ["Salary", "Farming", "Side Hustle", "Online Work", "Rental Income", "Business Sales", "Commissions", "Other"];
    const expenseItems = ["Rent", "Food", "Transport", "Fuel", "Utilities", "Medical", "Loan Payments", "Internet", "Betting", "Eating Out", "Impulse Spending", "Subscriptions", "Lifestyle Pressure", "Other"];
    const assetItems = ["Stocks", "Real Estate", "Business", "Cash", "Gold", "Other"];
    const liabilityItems = ["Loan", "Phone Debt", "SACCO Debt", "Motorbike Loan", "Credit Card", "Other"];

    function handleAuth() {
        const phone = document.getElementById('phone-input').value.trim();
        const pin = document.getElementById('pin-input').value.trim();
        if (phone && pin.length === 4) {
            localStorage.setItem('chawkUser', JSON.stringify({phone, pin}));
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            initApp();
        } else {
            alert("Enter phone and 4-digit PIN (demo: 1234)");
        }
    }

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${n}`).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===n));
    }

    function initTable(tableId, items) {
        const table = document.getElementById(tableId);
        table.innerHTML = `<thead class="bg-gray-100"><tr><th class="p-4 text-left">Item</th><th class="p-4 text-right">Amount</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        items.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-4">${item}</td><td class="border p-4"><input type="number" step="0.01" value="0" class="w-full text-right" onchange="saveData()"></td>`;
            tbody.appendChild(tr);
        });
    }

    function calcDaily() {
        const inAmt = parseFloat(document.getElementById('daily-in').value) || 0;
        const outAmt = parseFloat(document.getElementById('daily-out').value) || 0;
        const net = inAmt - outAmt;
        document.getElementById('daily-net').textContent = net.toFixed(2);
    }

    function saveData() {
        // Auto save to localStorage
        localStorage.setItem('chawkData', JSON.stringify({
            dailyIn: document.getElementById('daily-in').value,
            dailyOut: document.getElementById('daily-out').value,
            assetSpend: document.getElementById('asset-spend').value,
            liabSpend: document.getElementById('liab-spend').value
        }));
    }

    function initApp() {
        initTable('income-table', incomeItems);
        initTable('expense-table', expenseItems);
        initTable('asset-table', assetItems);
        initTable('liability-table', liabilityItems);
        switchTab(0);
    }

    function populateMonths() {
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        for (let y = 2025; y <= 2027; y++) {
            for (let m = 1; m <= 12; m++) {
                const val = `\( {y}- \){String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (val === "2026-06") opt.selected = true;
                select.appendChild(opt);
            }
        }
    }

    function switchMonth() {}

    // PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        deferredPrompt = e;
        document.getElementById('installBtn').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) deferredPrompt.prompt();
    }

    window.onload = function() {
        populateMonths();
        if (localStorage.getItem('chawkUser')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            initApp();
        }
    };
</script>
</body>
</html>
