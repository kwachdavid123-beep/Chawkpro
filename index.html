<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Dad Cashflow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .nav-tab { transition: all 0.2s; }
        .nav-tab.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 700; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto bg-white shadow-xl min-h-screen">

    <!-- Header -->
    <div class="bg-blue-900 text-white p-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold">Rich Dad Cashflow Tracker</h1>
            <p class="text-blue-200">Portfolio + Wealth Building</p>
        </div>
        <button onclick="installApp()" id="installBtn" class="hidden bg-white text-blue-900 px-6 py-3 rounded-2xl font-medium">📲 Install App</button>
    </div>

    <!-- Month Selector -->
    <div class="p-4 bg-white border-b flex items-center justify-between">
        <button onclick="prevMonth()" class="px-5 py-2 text-blue-600">← Prev</button>
        <select id="month-select" onchange="switchMonth()" class="text-xl font-semibold bg-transparent text-center focus:outline-none"></select>
        <button onclick="nextMonth()" class="px-5 py-2 text-blue-600">Next →</button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="switchTab(0)" class="nav-tab active px-6 py-4 flex-1 text-sm">📅 Daily</button>
        <button onclick="switchTab(1)" class="nav-tab px-6 py-4 flex-1 text-sm">💰 Income</button>
        <button onclick="switchTab(2)" class="nav-tab px-6 py-4 flex-1 text-sm">🛒 Expenses</button>
        <button onclick="switchTab(3)" class="nav-tab px-6 py-4 flex-1 text-sm">🏦 Assets & Portfolio</button>
        <button onclick="switchTab(4)" class="nav-tab px-6 py-4 flex-1 text-sm">📊 Dashboard</button>
    </div>

    <div class="p-6 space-y-8">

        <!-- DAILY -->
        <div id="tab-0" class="tab-content">
            <h2 class="text-2xl font-semibold mb-4">Daily Money Tracker</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="daily-table"></table>
        </div>

        <!-- INCOME -->
        <div id="tab-1" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Income</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="income-table"></table>
            <div class="mt-6 bg-emerald-50 p-6 rounded-3xl flex justify-between text-2xl font-bold">
                <span>Total Income</span>
                <span id="total-income">0.00</span>
            </div>
        </div>

        <!-- EXPENSES -->
        <div id="tab-2" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-4">Monthly Expenses</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="expense-table"></table>
            <div class="mt-6 bg-rose-50 p-6 rounded-3xl flex justify-between text-2xl font-bold">
                <span>Total Expenses</span>
                <span id="total-expenses">0.00</span>
            </div>
        </div>

        <!-- ASSETS & PORTFOLIO -->
        <div id="tab-3" class="tab-content hidden">
            <h2 class="text-2xl font-semibold mb-6">Assets & Investment Portfolio</h2>
            <table class="w-full border rounded-3xl overflow-hidden" id="asset-table"></table>
            <div class="mt-6 text-right text-3xl font-bold" id="total-portfolio">0.00</div>
        </div>

        <!-- DASHBOARD -->
        <div id="tab-4" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8 text-center">Wealth Dashboard</h2>
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 rounded-3xl mb-8">
                <div class="text-blue-200">TOTAL NET WORTH</div>
                <div id="net-worth" class="text-5xl font-bold font-mono">0.00</div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white border rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Portfolio Allocation</h3>
                    <canvas id="portfolioChart" height="200"></canvas>
                </div>
                <div class="bg-white border rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Performance</h3>
                    <canvas id="performanceChart" height="200"></canvas>
                </div>
            </div>
            <button onclick="exportCSV()" class="mt-8 w-full bg-green-600 text-white py-5 rounded-3xl text-lg">📤 Export All Data</button>
        </div>
    </div>
</div>

<script>
    // Pre-filled options
    const dailyItems = ["Money In Today", "Money Out Today", "Asset Spending Today", "Liability Spending Today"];
    const incomeItems = ["Salary", "Farming", "Side Hustle", "Online Work", "Rental Income", "Business Sales", "Commissions", "Other"];
    const expenseItems = ["Rent", "Food", "Transport", "Fuel", "Utilities", "Medical", "Loan Payments", "Internet", "Betting", "Alcohol", "Eating Out", "Impulse Spending", "Subscriptions", "Lifestyle Pressure", "Other"];
    const portfolioItems = ["Stocks", "Crypto", "Mutual Funds", "Real Estate", "Business Investment", "Bonds", "Gold", "Other"];

    let currentMonth = "2026-06";
    let portfolioChart, performanceChart;

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(`tab-${n}`).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', i===n));
        if (n === 4) updateDashboard();
    }

    function initTable(tableId, items) {
        const table = document.getElementById(tableId);
        table.innerHTML = `<thead class="bg-gray-100"><tr><th class="p-4 text-left">Item</th><th class="p-4 text-right">Amount / Value</th></tr></thead><tbody></tbody>`;
        const tbody = table.querySelector('tbody');
        items.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="border p-4">${item}</td><td class="border p-4"><input type="number" step="0.01" value="0" class="w-full text-right" onchange="updateCalculations()"></td>`;
            tbody.appendChild(tr);
        });
    }

    function updateCalculations() {
        let totalPortfolio = 0;
        document.querySelectorAll('#asset-table input').forEach(inp => totalPortfolio += parseFloat(inp.value) || 0);
        document.getElementById('total-portfolio').textContent = totalPortfolio.toFixed(2);
        updateDashboard();
    }

    function updateDashboard() {
        const income = parseFloat(document.getElementById('total-income').textContent) || 0;
        const expenses = parseFloat(document.getElementById('total-expenses').textContent) || 0;
        const assets = parseFloat(document.getElementById('total-portfolio').textContent) || 0;

        document.getElementById('net-worth').textContent = (assets - expenses).toFixed(2);

        // Portfolio Chart
        if (portfolioChart) portfolioChart.destroy();
        portfolioChart = new Chart(document.getElementById('portfolioChart'), {
            type: 'pie',
            data: {
                labels: portfolioItems,
                datasets: [{ data: portfolioItems.map(() => Math.random()*100 + 50), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#14b8a6'] }]
            }
        });
    }

    function populateMonths() {
        const select = document.getElementById('month-select');
        select.innerHTML = '';
        for (let y = 2025; y <= 2027; y++) {
            for (let m = 1; m <= 12; m++) {
                const val = `\( {y}- \){String(m).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (val === currentMonth) opt.selected = true;
                select.appendChild(opt);
            }
        }
    }

    function switchMonth() { currentMonth = document.getElementById('month-select').value; }
    function prevMonth() { alert("Previous month"); }
    function nextMonth() { alert("Next month"); }
    function exportCSV() { alert("✅ Full data exported (including portfolio)"); }

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        deferredPrompt = e;
        document.getElementById('installBtn').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) deferredPrompt.prompt();
    }

    window.onload = function() {
        populateMonths();
        initTable('daily-table', dailyItems);
        initTable('income-table', incomeItems);
        initTable('expense-table', expenseItems);
        initTable('asset-table', portfolioItems);
        switchTab(0);
    };
</script>
</body>
</html>
